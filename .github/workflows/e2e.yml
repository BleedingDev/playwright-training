name: Functional E2E

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Build and start application
        run: docker compose up --detach --build app

      - name: Wait for application
        run: node scripts/workshop-cli.mjs wait-for-health http://127.0.0.1:8080/health

      - name: Reset deterministic data
        run: docker compose exec -T app php artisan migrate:fresh --seed --force

      - name: Run fixed Playwright functional suite
        run: docker compose run --rm -e PLAYWRIGHT_BASE_URL=http://app:9999 playwright pnpm exec playwright test --grep-invert '@visual|@exercise'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-results
          path: test-results
          if-no-files-found: ignore

      - name: Application logs
        if: failure()
        run: docker compose logs app
