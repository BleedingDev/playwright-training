[tools]
node = "26.5.0"
pnpm = "11.13.0"

[env]
PLAYWRIGHT_BASE_URL = "http://127.0.0.1:8080"

[tasks.setup]
description = "Install dependencies, build containers, seed data, and install Chromium"
run = "node scripts/workshop-cli.mjs setup"

[tasks.doctor]
description = "Check the complete workshop environment"
run = "node scripts/workshop-cli.mjs doctor"

[tasks."app:up"]
description = "Build and start SídloFlow with live RÚIAN address search"
run = "node scripts/workshop-cli.mjs app:up"

[tasks."app:up:test"]
description = "Build and start SídloFlow with the deterministic RÚIAN fixture"
run = "node scripts/workshop-cli.mjs app:up:test"

[tasks."app:down"]
description = "Stop the application"
run = "node scripts/workshop-cli.mjs app:down"

[tasks."app:reset"]
description = "Reset and deterministically seed application data"
run = "node scripts/workshop-cli.mjs app:reset"

[tasks."app:logs"]
description = "Follow application logs"
run = "node scripts/workshop-cli.mjs app:logs"

[tasks."test:php"]
description = "Run the PHP test suite in the reproducible testing image"
run = "node scripts/workshop-cli.mjs test:php"

[tasks."test:e2e"]
description = "Run the current Playwright workshop suite locally"
run = "node scripts/workshop-cli.mjs test:e2e"

[tasks."test:e2e:docker"]
description = "Run the current suite in the matching Playwright image"
run = "node scripts/workshop-cli.mjs test:e2e:docker"

[tasks."test:ui"]
description = "Open Playwright UI Mode"
run = "node scripts/workshop-cli.mjs test:ui"

[tasks."test:codegen"]
description = "Open Playwright Codegen"
run = "node scripts/workshop-cli.mjs test:codegen"

[tasks."test:report"]
description = "Open the latest Playwright HTML report"
run = "node scripts/workshop-cli.mjs test:report"

[tasks."exercise:weak-test"]
run = "node scripts/workshop-cli.mjs exercise:weak-test"

[tasks."exercise:mocking"]
run = "node scripts/workshop-cli.mjs exercise:mocking"

[tasks.verify]
description = "Reset data and run the current critical flow"
run = "node scripts/workshop-cli.mjs verify:critical"
